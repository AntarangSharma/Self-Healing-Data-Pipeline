# Validates PRs opened by the shdpa agent (branches that start with `shdpa/`).
# - Runs the normal test suite
# - Runs ruff lint
# - Runs `python -m py_compile` on every changed .py file
# - Runs `sqlparse` on every changed .sql file (basic syntax sanity)
# If any check fails, comments on the PR and closes it.
#
# Why close: a broken agent-PR sitting around for a human to triage is worse
# than no PR at all — it adds review load. We let the human re-trigger the
# agent (which has the fix) and open a fresh PR.
name: agent-pr-check

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  validate:
    if: startsWith(github.head_ref, 'shdpa/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" sqlparse

      - name: Lint changed files
        run: ruff check src/ tests/

      - name: Run test suite
        env:
          SHDPA_LLM_PROVIDER: mock
          SHDPA_PROMPT_VERSION: v3
        run: pytest tests/ --ignore=tests/test_real_llm_providers.py -q

      - name: py_compile changed .py files
        run: |
          set -e
          changed=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- '*.py' || true)
          if [ -n "$changed" ]; then
            python -m py_compile $changed
          fi

      - name: sqlparse changed .sql files
        run: |
          set -e
          changed=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- '*.sql' || true)
          if [ -n "$changed" ]; then
            for f in $changed; do
              python -c "import sqlparse, sys; sql=open(sys.argv[1]).read(); parsed=sqlparse.parse(sql); sys.exit(0 if parsed else 1)" "$f"
            done
          fi

      - name: Comment + close on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: pr.number,
              body: ":x: shdpa agent PR failed automated validation. " +
                    "Closing — re-run the agent against a fresh incident.\n\n" +
                    "Check the [Action log](" + context.payload.pull_request.html_url + "/checks) for details."
            });
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              pull_number: pr.number,
              state: "closed"
            });
